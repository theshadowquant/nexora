name: Nexora Integration Validation Check

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  validate-and-build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'npm'

    - name: Install Dependencies
      run: npm ci

    - name: Generate Prisma Client
      run: npx prisma generate
      env:
        DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/postgres?schema=public"

    - name: Audit Syntax Lints
      run: npm run lint
      continue-on-error: true # Allow logs audits during early beta phases

    - name: Verify Next.js Compilation Build
      run: npm run build
      env:
        DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/postgres?schema=public"
        DIRECT_URL: "postgresql://postgres:postgres@localhost:5432/postgres?schema=public"
        OPENAI_API_KEY: "mock-openai-api-key"
        NEXTAUTH_SECRET: "mock-nextauth-secret-key"
        NEXTAUTH_URL: "http://localhost:3000"

